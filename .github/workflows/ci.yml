name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Nightly build at 02:00 UTC — triggers the template-nightly job
    - cron: '0 2 * * *'
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Job 1: b-bot-core unit tests + JaCoCo + Javadoc ──────────────────────
  core-tests:
    name: Core unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test b-bot-core (unit tests + JaCoCo + Javadoc JAR)
        run: mvn verify -pl b-bot-core --no-transfer-progress

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: b-bot-core/target/site/jacoco/
          retention-days: 14

  # ─── Job 2: b-bot-sandbox integration tests (66 scenarios) ────────────────
  sandbox-tests:
    name: Sandbox integration tests (66 scenarios)
    runs-on: ubuntu-latest
    needs: core-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright browsers
        run: mvn test-compile -pl b-bot-sandbox -Dplaywright.install.skip=false --no-transfer-progress

      - name: Run sandbox suite (headless Chromium, committed WireMock assets)
        run: mvn verify -pl b-bot-sandbox --no-transfer-progress

      - name: Upload Cucumber HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: b-bot-sandbox/target/cucumber-html-reports/
          retention-days: 14

      - name: Upload Playwright traces (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: b-bot-sandbox/target/playwright-traces/
          retention-days: 7

  # ─── Job 3: Template nightly smoke (24 scenarios against mock UAT) ─────────
  # Runs on schedule (nightly) and manual dispatch; skipped on push/PR to save time.
  template-nightly:
    name: Template nightly (24 scenarios, mock UAT)
    runs-on: ubuntu-latest
    needs: sandbox-tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build sandbox test classes (needed to run dev servers)
        run: mvn test-compile -pl b-bot-sandbox --no-transfer-progress

      - name: Install Playwright browsers (template module)
        run: mvn test-compile -pl pt-blotter-regression-template -Dplaywright.install.skip=false --no-transfer-progress

      - name: Start mock UAT servers in background
        run: |
          chmod +x scripts/start-mock-uat.sh
          # Run in background so this step does not block
          nohup scripts/start-mock-uat.sh > /tmp/mock-uat-startup.log 2>&1 &
          # Wait up to 60 s for all three servers to become ready
          for i in $(seq 1 30); do
            if curl -s -f -o /dev/null http://localhost:9099/blotter/ &&
               curl -s -f -o /dev/null http://localhost:8090/api/config &&
               curl -s -f -o /dev/null http://localhost:9098/api/deployments; then
              echo "All mock UAT servers ready"
              break
            fi
            echo "Waiting for servers... ($i/30)"
            sleep 2
          done
          curl -sf http://localhost:9099/blotter/ || (cat /tmp/mock-uat-startup.log && exit 1)
          curl -sf http://localhost:8090/api/config || (cat /tmp/mock-uat-startup.log && exit 1)
          curl -sf http://localhost:9098/api/deployments || (cat /tmp/mock-uat-startup.log && exit 1)

      - name: Run template regression suite (24 scenarios)
        run: mvn verify -pl pt-blotter-regression-template -Db-bot.env=mockuat --no-transfer-progress

      - name: Upload template surefire report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: template-surefire-report
          path: pt-blotter-regression-template/target/surefire-reports/
          retention-days: 14

      - name: Stop mock UAT servers
        if: always()
        run: |
          chmod +x scripts/stop-mock-uat.sh
          scripts/stop-mock-uat.sh || true
