# pt-blotter-regression base config.
# URLs are NOT hardcoded here — use environment-specific overlays:
#   application-devserver.conf  (local mock via BlotterDevServer)
#   application-uat.conf        (UAT real system)
#   application-preprod.conf    (pre-prod real system)
#
# Activate:
#   mvn verify -Db-bot.env=devserver
#   mvn verify -Db-bot.env=uat
#   B_BOT_ENV=uat mvn verify

b-bot {
  apps {
    blotter {
      # webUrl and apiBase supplied by application-{env}.conf
      users { trader = doej, admin = smithj }
    }
  }
}
