# Dev-server environment — points at the local BlotterDevServer (port 9099).
#
# Start the dev server first:
#   cd b-bot-sandbox
#   mvn exec:java -Dexec.mainClass=utils.BlotterDevServer -Dexec.classpathScope=test
#
# Then run smoke against it:
#   cd pt-blotter-regression
#   mvn verify -Db-bot.env=devserver -Dcucumber.filter.tags="@smoke"

b-bot {
  apps {
    blotter {
      webUrl  = "http://localhost:9099/blotter/"
      apiBase = "http://localhost:9099"
    }
  }
}
