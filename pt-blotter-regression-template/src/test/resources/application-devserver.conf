# Dev-server environment — points at BlotterDevServer (port 9099) only.
# Useful for a quick blotter-only smoke check without starting all three servers.
#
# Start the blotter dev server (from project root):
#   mvn exec:java -pl b-bot-sandbox \
#       -Dexec.mainClass=utils.BlotterDevServer \
#       -Dexec.classpathScope=test
#
# Then run:
#   mvn verify -pl pt-blotter-regression-template -Db-bot.env=devserver \
#       -Dcucumber.filter.tags="@smoke"
#
# For the full suite (all three servers), use -Db-bot.env=mockuat instead.
# See: scripts/start-mock-uat.sh  (or .bat on Windows)

b-bot {
  apps {
    blotter {
      webUrl  = "http://localhost:9099/blotter/"
      apiBase = "http://localhost:9099"
    }
  }
}
