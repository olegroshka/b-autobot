# Mock UAT environment — all three demo servers running locally.
#
# Start the servers BEFORE running this suite:
#   Unix/Mac:  scripts/start-mock-uat.sh
#   Windows:   scripts\start-mock-uat.bat
#
# Then run the full suite:
#   mvn verify -pl pt-blotter-regression-template -Db-bot.env=mockuat
#
# Or run a subset by tag:
#   mvn verify -pl pt-blotter-regression-template -Db-bot.env=mockuat -Dcucumber.filter.tags="@smoke"
#   mvn verify -pl pt-blotter-regression-template -Db-bot.env=mockuat -Dcucumber.filter.tags="@workflow"
#   mvn verify -pl pt-blotter-regression-template -Db-bot.env=mockuat -Dcucumber.filter.tags="@rest-probe"
#
# Stop the servers when done:
#   Unix/Mac:  scripts/stop-mock-uat.sh
#   Windows:   scripts\stop-mock-uat.bat

b-bot {

  apps {
    blotter {
      webUrl  = "http://localhost:9099/blotter/"
      apiBase = "http://localhost:9099"
      users   { trader = doej, admin = smithj }
    }
    config-service {
      apiBase = "http://localhost:8090"
    }
    deployment {
      webUrl  = "http://localhost:9098/deployment/"
      apiBase = "http://localhost:9098"
    }
  }

  # ── Test data ───────────────────────────────────────────────────────────────
  # Central repository for all test data used in REST probe scenarios and JSON
  # request templates.  Change values here -- feature files stay stable.
  test-data {

    # Global variables -- substituted as ${key} in any JSON template.
    # Update settlement-date once here; every template picks up the change.
    settlement-date = "2026-03-21"

    # Named bond lists -- groups of ISINs for a regression run.
    # When a bond matures, update the ISIN here -- not in feature files.
    # Reference in steps:     bond "HYPT_1" field "ISIN1"
    # Reference in templates: ${bond.ISIN1}  (when bond list is active for the call)
    bond-lists {

      # High-yield portfolio PT_BBG_20260306_3F7A (first three seeded inquiries)
      HYPT_1 {
        ISIN1 = "US912828YJ02"   # US Treasury 2Y  -- INQ-001
        ISIN2 = "XS2346573523"   # XS EUR HY bond  -- INQ-002
        ISIN3 = "US38141GXZ20"   # US HY bond      -- INQ-003
      }

      # Investment-grade portfolio PT_BBG_20260306_9C2E (last two seeded inquiries)
      IG_1 {
        ISIN1 = "GB0031348658"   # UK Gilt          -- INQ-004
        ISIN2 = "FR0014004L86"   # French OAT       -- INQ-005
      }
    }

    # Template registry -- short name to classpath resource path.
    # Templates live under src/test/resources/ in this module.
    templates {
      credit-rfq    = "templates/credit-rfq.json"
      quote-inquiry = "templates/quote-inquiry.json"
      portfolio-rfq = "templates/portfolio-rfq.json"
    }

    # Service versions under test — must match MockDeploymentServer / mock UAT seed data.
    # Update once here when deploying a new version.
    service-versions {
      credit-rfq-blotter   = "v2.4.1"
      credit-pt-pricer     = "v1.8.3"
      credit-pt-neg-engine = "v3.1.0"
    }

    # Named users — roles map to usernames seeded in the Config Service.
    users {
      trader  = "doej"
      admin   = "smithj"
      trader2 = "patelv"
      admin2  = "nguyenl"
    }

    # Named API actions -- method, app, and path defined once; referenced by name in scenarios.
    # Path tokens in curly braces {key} are resolved at runtime from captured scenario state.
    # This block is the living API contract document for the system under test.
    api-actions {

      # POST a new RFQ inquiry to the blotter
      submit-rfq {
        method   = "POST"
        app      = "blotter"
        path     = "/api/inquiry"
        template = "credit-rfq"
      }

      # List all current inquiries (seed + dynamically submitted)
      list-inquiries {
        method   = "GET"
        app      = "blotter"
        path     = "/api/inquiries"
      }

      # Quote an existing inquiry — requires {inquiry_id} captured from a prior submit
      quote-inquiry {
        method   = "POST"
        app      = "blotter"
        path     = "/api/inquiry/{inquiry_id}/quote"
        template = "quote-inquiry"
      }
    }

    # Named portfolios -- test PT IDs deliberately differ from seed PT IDs so dynamic
    # submissions are distinguishable in the blotter grid and regression reports.
    # Each bond feeds the portfolio-rfq template via ${isin}, ${quantity}, ${side}, etc.
    portfolios {

      HYPT_1 {
        pt-id           = "PT_TEST_20260321_AA01"
        settlement-date = "2026-03-21"
        bonds {
          line-1 { isin = "US912828YJ02", quantity = 2000000, side = "Buy",  currency = "USD" }
          line-2 { isin = "XS2346573523", quantity = 1500000, side = "Sell", currency = "EUR" }
        }
      }
    }
  }
}
