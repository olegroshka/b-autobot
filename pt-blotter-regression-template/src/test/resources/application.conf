# pt-blotter-regression-template base config.
#
# This file is the lowest-priority consumer override layer.
# It is loaded by every environment unless overridden by application-{env}.conf.
#
# URLs are NOT hardcoded here — supply them in environment-specific overlays:
#   application-devserver.conf  (local BlotterDevServer on port 9099)
#   application-uat.conf        (UAT or pre-prod real system)
#
# Activate an environment:
#   mvn verify -Db-bot.env=devserver
#   mvn verify -Db-bot.env=uat
#   B_BOT_ENV=uat mvn verify    (CI-friendly env var form)

b-bot {

  # ── Application users ──────────────────────────────────────────────────────
  # Declare named roles here; URLs come from the active env conf.
  apps {
    blotter {
      # webUrl and apiBase supplied by application-{env}.conf
      users { trader = doej, admin = smithj }
    }
  }

  # ── Optional: override b-bot-core defaults ──────────────────────────────────
  # All keys below match the defaults in b-bot-core's reference.conf.
  # Uncomment and adjust for your environment. Delete this section if the
  # core defaults are fine for you.
  #
  # browser {
  #   type     = chromium          # chromium | firefox | webkit
  #   headless = true              # false = open a real browser window
  #   viewport { width = 1920, height = 1080 }
  # }
  #
  # timeouts {
  #   navigation     = 30s    # page.navigate() / waitForLoadState() budget
  #   cellFlash      = 3s     # wait for ag-cell-data-changed CSS class to appear
  #   gridRender     = 10s    # wait for AG Grid to show at least one row
  #   apiResponse    = 10s    # HTTP budget for DSL REST calls
  #
  #   # GridHarness phase budgets (tune for slow/remote environments)
  #   gridFastPath   = 500ms  # phase-1: fast DOM scan timeout
  #   gridRowInDom   = 5s     # phase-2: confirm row in DOM after ensureIndexVisible
  #   gridHasRows    = 5s     # phase-3: wait for any row before scroll-probe starts
  #   gridScrollStep = 2s     # phase-3: per-step scroll wait
  #
  #   # Health/version check HTTP timeouts
  #   healthCheck    = 10s    # connect + response timeout for BBotRegistry probes
  # }
  #
  # grid {
  #   renderPollMs   = 100    # waitForFunction poll interval (ms) in GridHarness
  #   maxScrollSteps = 200    # max scroll iterations before GridHarness gives up
  # }
  #
  # ticking {
  #   pollMs = 150            # waitForFunction poll interval (ms) for ticking cells
  # }
}
