# b-bot-core defaults.
# These have the lowest priority — everything can be overridden by the consumer's
# application.conf, application-{env}.conf, JVM system properties, or runtime
# BBotConfig.withOverrides() calls.
#
# All keys live under the "b-bot" namespace to avoid collisions with other
# HOCON-based libraries on the classpath (e.g. Akka, Lightbend platform).
#
# Loading order (highest priority wins):
#   1. Runtime overrides      — BBotConfig.withOverrides(Map) at @BeforeAll time
#   2. JVM system properties  — -Db-bot.browser.headless=false
#   3. application-{env}.conf — environment layer (classpath, consuming module)
#   4. application.conf       — consumer base defaults (classpath, consuming module)
#   5. THIS FILE              — lowest priority, always present via core JAR

b-bot {

  # ── Browser ────────────────────────────────────────────────────────────────
  # Override on CLI: -Db-bot.browser.headless=false  -Db-bot.browser.type=firefox
  browser {
    type     = chromium          # chromium | firefox | webkit
    headless = true
    viewport { width = 1920, height = 1080 }
  }

  # ── Timeouts ───────────────────────────────────────────────────────────────
  # All values use HOCON duration syntax: 30s, 500ms, 2m, etc.
  # Increase for slow/remote environments; decrease for fast local dev loops.
  timeouts {

    # Playwright page.navigate() / waitForLoadState() budget
    navigation     = 30s

    # How long to wait for ag-cell-data-changed CSS class to appear (ticking cells)
    cellFlash      = 3s

    # How long to wait for AG Grid to render at least one row after navigation
    gridRender     = 10s

    # HTTP response budget for REST API calls made by DSLs (e.g. inquiry submission)
    apiResponse    = 10s

    # GridHarness phase 1 — fast-path DOM scan: how long to look for a row already visible
    gridFastPath   = 500ms

    # GridHarness phase 2 — after ensureIndexVisible: how long to wait for the row's DOM node
    gridRowInDom   = 5s

    # GridHarness phase 3 — scroll-probe: how long to wait for any row to appear before scrolling
    gridHasRows    = 5s

    # GridHarness phase 3 — per scroll step: how long to wait for new rows to render
    gridScrollStep = 2s

    # HTTP connect+response timeout for health-check and version-check probes in BBotRegistry
    healthCheck    = 10s
  }

  # ── Grid harness tuning ────────────────────────────────────────────────────
  grid {
    # Polling interval (ms) for waitForFunction row-in-DOM checks inside GridHarness.
    # Lower = faster response but more CPU; higher = gentler on the browser.
    renderPollMs   = 100

    # Maximum number of scroll steps before GridHarness gives up and throws.
    # Increase for very long grids (> 10 000 rows).
    maxScrollSteps = 200
  }

  # ── Ticking cell tuning ────────────────────────────────────────────────────
  ticking {
    # Polling interval (ms) for waitForFunction checks in TickingCellHelper.
    # Should be well below the cell update frequency (~200-500 ms for finance demos).
    pollMs = 150
  }


  # ── Test data ──────────────────────────────────────────────────────────────
  # Centralised test data for REST probe scenarios and JSON templates.
  # Define in your application-{env}.conf; reference here is intentionally empty.
  #
  # Structure:
  #
  #   b-bot.test-data {
  #
  #     # Global scalar variables — substituted as ${key} in any template.
  #     # Useful for values that change across regression runs (e.g. settlement date).
  #     settlement-date = "2026-03-21"
  #
  #     # Named bond lists — group ISINs and related identifiers by portfolio/strategy.
  #     # Access in templates as ${bond.FIELD}, in steps as bond "LIST" field "FIELD".
  #     bond-lists {
  #       HYPT_1 { ISIN1 = "XS2346573523", ISIN2 = "US912828YJ02" }
  #       IGPT_1 { ISIN1 = "GB0031348658" }
  #     }
  #
  #     # Template registry — maps short names to classpath resource paths.
  #     # Templates live under src/test/resources/ in your module.
  #     templates {
  #       credit-rfq    = "templates/credit-rfq.json"
  #       quote-inquiry = "templates/quote-inquiry.json"
  #     }
  #   }
  test-data {
    bond-lists {}
    templates  {}
  }

  # ── Apps ───────────────────────────────────────────────────────────────────
  # No defaults — each consumer declares its own applications.
  # URLs, users, and versions are supplied by application-{env}.conf.
  apps {}
}
