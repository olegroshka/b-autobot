# b-bot-core defaults.
# These have the lowest priority — everything can be overridden by the consumer's
# application.conf, application-{env}.conf, JVM system properties, or runtime
# BBotConfig.withOverrides() calls.
#
# All keys live under the "b-bot" namespace to avoid collisions with other
# HOCON-based libraries on the classpath (e.g. Akka, Lightbend platform).
#
# Loading order (highest priority wins):
#   1. Runtime overrides      — BBotConfig.withOverrides(Map) at @BeforeAll time
#   2. JVM system properties  — -Db-bot.browser.headless=false
#   3. application-{env}.conf — environment layer (classpath, consuming module)
#   4. application.conf       — consumer base defaults (classpath, consuming module)
#   5. THIS FILE              — lowest priority, always present via core JAR

b-bot {

  # ── Browser ────────────────────────────────────────────────────────────────
  # Override on CLI: -Db-bot.browser.headless=false  -Db-bot.browser.type=firefox
  browser {
    type     = chromium          # chromium | firefox | webkit
    headless = true
    viewport { width = 1920, height = 1080 }
  }

  # ── Timeouts ───────────────────────────────────────────────────────────────
  # All values use HOCON duration syntax: 30s, 500ms, 2m, etc.
  # Increase for slow/remote environments; decrease for fast local dev loops.
  timeouts {

    # Playwright page.navigate() / waitForLoadState() budget
    navigation     = 30s

    # How long to wait for ag-cell-data-changed CSS class to appear (ticking cells)
    cellFlash      = 3s

    # How long to wait for AG Grid to render at least one row after navigation
    gridRender     = 10s

    # HTTP response budget for REST API calls made by DSLs (e.g. inquiry submission)
    apiResponse    = 10s

    # GridHarness phase 1 — fast-path DOM scan: how long to look for a row already visible
    gridFastPath   = 500ms

    # GridHarness phase 2 — after ensureIndexVisible: how long to wait for the row's DOM node
    gridRowInDom   = 5s

    # GridHarness phase 3 — scroll-probe: how long to wait for any row to appear before scrolling
    gridHasRows    = 5s

    # GridHarness phase 3 — per scroll step: how long to wait for new rows to render
    gridScrollStep = 2s

    # HTTP connect+response timeout for health-check and version-check probes in BBotRegistry
    healthCheck    = 10s
  }

  # ── Grid harness tuning ────────────────────────────────────────────────────
  grid {
    # Polling interval (ms) for waitForFunction row-in-DOM checks inside GridHarness.
    # Lower = faster response but more CPU; higher = gentler on the browser.
    renderPollMs   = 100

    # Maximum number of scroll steps before GridHarness gives up and throws.
    # Increase for very long grids (> 10 000 rows).
    maxScrollSteps = 200
  }

  # ── Ticking cell tuning ────────────────────────────────────────────────────
  ticking {
    # Polling interval (ms) for waitForFunction checks in TickingCellHelper.
    # Should be well below the cell update frequency (~200-500 ms for finance demos).
    pollMs = 150
  }


  # ── Authentication ────────────────────────────────────────────────────────
  # Controls how the browser and REST client authenticate against enterprise SSO.
  #
  # Modes:
  #   none              — no authentication (default; for mock environments)
  #   interactive       — opens a headed browser, pauses for manual SSO login + MFA
  #   storageState      — loads a previously saved Playwright storageState JSON file
  #   auto              — tries storageState first; falls back to interactive if expired
  #   clientCredentials — OAuth2 client_credentials grant (for CI, no browser needed)
  #
  # Override on CLI: -Db-bot.auth.mode=interactive
  auth {
    mode = none

    # Path where browser cookies + localStorage are persisted after interactive login.
    # Created by interactive mode; consumed by storageState / auto modes.
    storageStatePath = "target/auth/storage-state.json"

    # How long a cached storageState file is considered valid before re-login.
    # Enterprise SSO tokens typically last 1–8 hours.
    sessionTtl = 4h

    # URL that triggers the SSO redirect (usually the app's home page).
    # Required for interactive / auto modes.
    loginUrl = ""

    # Maximum time to wait for the user to complete SSO login + MFA approval.
    loginTimeout = 120s

    # How to detect that login succeeded. Options:
    #   pause                  — use Playwright Inspector pause (user clicks Resume)
    #   urlContains:<pattern>  — post-login URL contains this substring
    #   element:<selector>     — a CSS selector visible only after login
    loginSuccessIndicator = "pause"

    # OAuth2 token endpoint URL (clientCredentials mode only).
    tokenUrl = ""

    # Client ID for the service principal / app registration.
    # Use HOCON env-var substitution: ${?B_BOT_CLIENT_ID}
    clientId = ""

    # Client secret — NEVER commit this; use env var or CI secret.
    # Use HOCON env-var substitution: ${?B_BOT_CLIENT_SECRET}
    clientSecret = ""

    # OAuth2 scope(s), space-separated.
    scope = ""

    # If true, 401 responses trigger a token refresh attempt before failing.
    # Only applies to clientCredentials mode.
    refreshOn401 = true
  }

  # ── Playwright tracing ──────────────────────────────────────────────────
  # Enable Playwright tracing for CI failure diagnosis.
  # Produces ZIP trace files viewable at https://trace.playwright.dev/
  # Override: -Db-bot.tracing.enabled=true
  tracing {
    enabled   = false
    outputDir = "target/playwright-traces"
  }

  # ── Test data ──────────────────────────────────────────────────────────────
  # Centralised test data for REST probe scenarios and JSON templates.
  # Define in your application-{env}.conf; reference here is intentionally empty.
  #
  # Structure:
  #
  #   b-bot.test-data {
  #
  #     # Global scalar variables — substituted as ${key} in any template.
  #     settlement-date = "2026-03-21"
  #
  #     # Bond catalogue — single source of truth for instrument data.
  #     # Each entry defines one bond; referenced by ID in portfolio lines and feature files.
  #     # Access in templates as ${bond.isin}, ${bond.description}, etc. via renderWithBond().
  #     # Access in steps as: bond "UST-2Y" (catalogue-direct) or bond "LIST" field "FIELD" (legacy).
  #     bonds {
  #       UST-2Y { isin = "US912828YJ02", description = "UST 4.25% 2034",
  #                maturity = "2034-11-15", coupon = 4.250 }
  #     }
  #
  #     # Named portfolios — each bond line references a catalogue entry via bond = "ID".
  #     # Instrument fields (isin/description/maturity/coupon) are resolved from the catalogue.
  #     # Only trading fields (quantity/side/currency/client) live in the portfolio line.
  #     portfolios {
  #       HYPT_1 {
  #         pt-id = "PT_TEST_001"
  #         bonds {
  #           line-1 { bond = "UST-2Y", quantity = 2000000, side = "Buy", currency = "USD" }
  #         }
  #       }
  #     }
  #
  #     # Template registry — maps short names to classpath resource paths.
  #     templates {
  #       credit-rfq    = "templates/credit-rfq.json"
  #       quote-inquiry = "templates/quote-inquiry.json"
  #     }
  #
  #     # Bond lists — DEPRECATED. Use the bonds catalogue instead.
  #     # Retained for backward compatibility; will be removed in a future version.
  #     bond-lists {
  #       HYPT_1 { ISIN1 = "XS2346573523", ISIN2 = "US912828YJ02" }
  #     }
  #   }
  test-data {
    bond-lists {}
    templates  {}
  }

  # ── Apps ───────────────────────────────────────────────────────────────────
  # No defaults — each consumer declares its own applications.
  # URLs, users, and versions are supplied by application-{env}.conf.
  apps {}
}
