# Test config for core unit tests — loaded when b-bot.env is not set (local).
# Provides test-data for JsonTemplateEngineTest and TestDataConfigTest.

b-bot {

  apps {
    blotter {
      api-actions {
        submit-rfq     { method = "POST", path = "/api/inquiry",  template = "test-rfq"   }
        list-inquiries { method = "GET",  path = "/api/inquiries"                                      }
        quote-inquiry  { method = "POST", path = "/api/inquiry/{inquiry_id}/quote", template = "test-quote" }
      }
    }
  }

  test-data {
    settlement-date = "2026-03-21"
    custom-global   = "global-value"

    bonds {
      UST-2Y      { isin = "US912828YJ02", description = "UST 4.25% 2034",        maturity = "2034-11-15", coupon = 4.250 }
      EUR-HY-XS23 { isin = "XS2346573523", description = "EUR IG Corp 3.5% 2029", maturity = "2029-03-20", coupon = 3.500 }
    }

    bond-lists {
      TEST_BONDS {
        ISIN1 = "US912828YJ02"
        ISIN2 = "XS2346573523"
      }
    }

    templates {
      test-rfq           = "templates/test-rfq.json"
      test-rfq-catalogue = "templates/test-rfq-catalogue.json"
      test-quote         = "templates/test-quote.json"
    }

    service-versions {
      credit-rfq-blotter = "v2.4.1"
    }

    users {
      trader = "doej"
      admin  = "smithj"
    }

    portfolios {
      TEST_PT {
        pt-id           = "PT_TEST_001"
        settlement-date = "2026-06-15"
        bonds {
          line-1 { isin = "US912828YJ02", quantity = 2000000, side = "Buy",  currency = "USD" }
          line-2 { isin = "XS2346573523", quantity = 1500000, side = "Sell", currency = "EUR" }
        }
      }
      NO_DATE_PT {
        pt-id = "PT_TEST_002"
        bonds {
          line-1 { isin = "GB0031348658", quantity = 1000000, side = "Buy", currency = "GBP" }
        }
      }
      # Portfolio using bond catalogue references — M5 normalisation test
      CATALOGUE_PT {
        pt-id           = "PT_TEST_003"
        settlement-date = "2026-06-15"
        bonds {
          line-1 { bond = "UST-2Y",      quantity = 2000000, side = "Buy",  currency = "USD", client = "BLACKROCK" }
          line-2 { bond = "EUR-HY-XS23", quantity = 1500000, side = "Sell", currency = "EUR", client = "PIMCO"     }
        }
      }
    }
  }
}

