      credit-rfq-blotter = "v2.4.1"
    }

    users {
      trader = "doej"
      admin  = "smithj"
    }

    portfolios {
      TEST_PT {
        pt-id           = "PT_TEST_001"
        settlement-date = "2026-06-15"
        bonds {
          line-1 { isin = "US912828YJ02", quantity = 2000000, side = "Buy",  currency = "USD" }
