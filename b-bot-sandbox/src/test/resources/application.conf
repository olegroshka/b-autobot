# b-bot-sandbox base config.
# URLs are NOT hardcoded here — mock server ports are dynamic and injected
# at @BeforeAll time via BBotConfig.withOverrides() in Hooks.java.
#
# Activate a different environment:
#   mvn verify -Db-bot.env=uat
#   B_BOT_ENV=uat mvn verify

b-bot {
  apps {
    blotter {
      # webUrl and apiBase injected at runtime — see sandbox Hooks.java
      users { trader = doej, admin = smithj }
      descriptor-class  = "com.bbot.sandbox.descriptors.BlotterAppDescriptor"
      health-check-path = "/api/health"
    }
    config-service {
      # apiBase injected at runtime
      descriptor-class  = "com.bbot.sandbox.descriptors.ConfigServiceDescriptor"
      health-check-path = "/api/config"
    }
    deployment {
      # webUrl and apiBase injected at runtime
      descriptor-class  = "com.bbot.sandbox.descriptors.DeploymentDescriptor"
      health-check-path = "/api/deployments"
    }
    finance-demo {
      # Public AG Grid Finance Demo — used by @external scenarios.
      # No apiBase — browser-only; no REST API contract.
      webUrl = "https://www.ag-grid.com/example-finance/"
    }
  }

  # ── Test data ────────────────────────────────────────────────────────────────
  # Single source of truth for all data referenced in feature files.
  # Feature files reference names only — no ISINs, versions, or user IDs hardcoded.
  test-data {

    # ── Bond catalogue — each instrument defined ONCE ──────────────────────────
    # The catalogue is the future single source of truth; bond-lists below are kept
    # for backward compatibility and will be removed in Milestone 5.
    bonds {
      UST-2Y      { isin = "US912828YJ02", description = "UST 4.25% 2034",           maturity = "2034-11-15", coupon = 4.250 }
      EUR-HY-XS23 { isin = "XS2346573523", description = "EUR IG Corp 3.5% 2029",    maturity = "2029-03-20", coupon = 3.500 }
      US-HY-GS    { isin = "US38141GXZ20", description = "Goldman Sachs 5.15% 2026", maturity = "2026-05-22", coupon = 5.150 }
      UK-GILT-27  { isin = "GB0031348658", description = "UK Gilt 1.25% 2027",       maturity = "2027-07-22", coupon = 1.250 }
      FR-OAT-28   { isin = "FR0014004L86", description = "OAT 0.75% 2028",           maturity = "2028-05-25", coupon = 0.750 }
    }

    # Bond lists — ISINs matching MockBlotterServer.buildSeedInquiries()
    # When a bond matures: change the ISIN here; feature files stay stable.
    bond-lists {
      HYPT_1  { ISIN1 = "US912828YJ02", ISIN2 = "XS2346573523", ISIN3 = "US38141GXZ20" }
      IGPT_1  { ISIN1 = "GB0031348658", ISIN2 = "FR0014004L86" }
    }

    # Service versions under test — must match MockDeploymentServer seed data.
    # Update once here when deploying a new version; all version-gate scenarios
    # automatically check against the new value.
    service-versions {
      credit-rfq-blotter   = "v2.4.1"
      credit-pt-pricer     = "v1.8.3"
      credit-pt-neg-engine = "v3.1.0"
    }

    # Named users — roles map to usernames seeded in MockConfigServer.
    # Update here if user IDs change between environments.
    users {
      trader  = "doej"
      admin   = "smithj"
      trader2 = "patelv"
      admin2  = "nguyenl"
      unknown = "UNKNOWN_TRADER"  # deliberate sentinel — rejected by the mock API (404)
    }
  }
}
